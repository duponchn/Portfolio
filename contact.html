<main>
    <h1>Où me contacter ?</h1>
        <section>
            <aside>
                <img src=" static/img/tel.png" alt="Image téléphone">
                <a href="tel:+33662606132" target="_blank">06 62 60 61 32</a>
            </aside>
            <aside>
                <img src=" static/img/mail.png" alt="Image mail">
                <a class="mail" href="mailto:Noah.Duponchel@etu.univ-grenoble-alpes.fr" target="_blank">Noah.Duponchel@etu.univ-grenoble-alpes.fr</a>
            </aside>

                <img src=" static/img/link.png" alt="Image réseaux sociaux">
                <a href="https://www.linkedin.com/in/noah-duponchel-5a63242aa" target="_blank">Noah Duponchel</a>
            </aside>
        </section>
    <form id="contact-form">
        <h2>Me contacter :</h2>

        <label>
            Nom
            <input type="text" name="nom" placeholder="Votre nom">
        </label>

        <label>
            Prénom
            <input type="text" name="prenom" placeholder="Votre prénom">
        </label>

        <label>
            Email *
            <input type="email" name="email" placeholder="Votre email" required>
        </label> 

        <label>
            Message *
            <textarea name="message" rows="9" placeholder="Tapez votre message ici !" required></textarea>
        </label>

        <input type="submit" value="Envoyer">
        <p id="status"></p>
    </form>

    
</main>

<script>
    const form = document.getElementById("contact-form");
    const status = document.getElementById("status");

    form.addEventListener("submit", function (e) {
        e.preventDefault();

        emailjs.sendForm(
            "service_m5o0o0b",
            "template_23patoe",
            this
        ).then(
            function () {
                status.textContent = "✅ Message envoyé avec succès !";
                status.style.color = "green";
                form.reset();
            },
            function () {
                status.textContent = "❌ Erreur lors de l'envoi du message.";
                status.style.color = "red";
            }
        );
    });
</script>

</body>
